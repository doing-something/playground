<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼각형으로 보는 2x2 행렬 변환</title>
    <link rel="stylesheet" href="../shared/demo.css">
    <style>
        main {
            width: min(920px, calc(100% - 32px));
        }

        h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
        }

        .explanation-panel h3 {
            font-size: 0.98rem;
            letter-spacing: -0.02em;
        }

        .rotation-group {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }

        .rotation-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .rotation-header h3 {
            margin: 0;
        }

        .rotation-group p {
            margin: 0;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .rotation-shortcuts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .rotation-shortcut {
            padding: 6px 10px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 999px;
            background: #fff;
            color: var(--text);
            font: inherit;
            font-size: 0.88rem;
            cursor: pointer;
        }

        .rotation-shortcut:hover {
            border-color: rgba(37, 99, 235, 0.45);
            background: rgba(239, 246, 255, 0.8);
        }

        .rotation-shortcut-active {
            border-color: rgba(37, 99, 235, 0.5);
            background: rgba(219, 234, 254, 0.95);
            color: #1d4ed8;
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.1);
        }

        .analysis-card code {
            margin-top: 8px;
            border-radius: 12px;
        }

        .metric-grid {
            display: grid;
            gap: 12px;
        }

        .metric-item {
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(241, 245, 249, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .metric-item dt {
            margin: 0 0 6px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .metric-item dd {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .vertex-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .vertex-table th,
        .vertex-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            vertical-align: top;
            text-align: left;
        }

        .vertex-table thead th {
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .vertex-table tbody th {
            font-weight: 600;
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 240px minmax(0, 1fr);
            }
        }

        @media (min-width: 1200px) {
            main {
                width: min(1280px, calc(100% - 32px));
            }

            .layout {
                grid-template-columns: 240px minmax(0, 1fr) 300px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="../dist/matrix-transform/main.js"></script>
</body>
</html>
