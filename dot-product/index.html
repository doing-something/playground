<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Transform Demo</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f8fafc;
            --panel: rgba(255, 255, 255, 0.88);
            --line: #cbd5e1;
            --text: #0f172a;
            --muted: #475569;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(59, 130, 246, 0.16), transparent 36%),
                linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
        }

        main {
            width: min(920px, calc(100% - 32px));
            margin: 40px auto;
            padding: 28px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        code {
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.16);
            font-family: "SF Mono", "Consolas", monospace;
        }

        .layout {
            display: grid;
            gap: 24px;
            align-items: start;
        }

        .control-panel {
            padding: 20px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.72);
        }

        .control-panel h2 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .control-panel p {
            margin-bottom: 16px;
            font-size: 0.96rem;
        }

        .matrix-form {
            display: grid;
            gap: 10px;
            width: fit-content;
        }

        .matrix-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(72px, 88px));
            gap: 10px;
        }

        .matrix-cell {
            display: grid;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .matrix-cell input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            border-radius: 12px;
            background: #fff;
            color: var(--text);
            font: inherit;
        }

        .matrix-cell input:focus {
            outline: 2px solid rgba(37, 99, 235, 0.22);
            border-color: rgba(37, 99, 235, 0.5);
        }

        .canvas-panel {
            display: grid;
            gap: 14px;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            border: 1px solid var(--line);
            border-radius: 18px;
            background:
                linear-gradient(rgba(148, 163, 184, 0.14) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.14) 1px, transparent 1px),
                #fff;
            background-size: 40px 40px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 240px minmax(0, 1fr);
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>삼각형 행렬 변환</h1>
        <p>
            아래 행렬 값을 바꾸면 캔버스가 바로 다시 그려집니다.
            현재 행렬은 <code id="matrix-preview">[[2, 0], [0, 2]]</code> 입니다.
        </p>
        <div class="layout">
            <section class="control-panel" aria-labelledby="matrix-controls-title">
                <h2 id="matrix-controls-title">행렬 입력</h2>
                <p>
                    각 칸은 2x2 변환 행렬의 원소입니다.
                    값을 바꿔서 삼각형이 어떻게 달라지는지 먼저 확인합니다.
                </p>
                <form id="matrix-form" class="matrix-form">
                    <div class="matrix-row">
                        <label class="matrix-cell" for="matrix-a">
                            a
                            <input id="matrix-a" name="matrix-a" type="number" step="any">
                        </label>
                        <label class="matrix-cell" for="matrix-b">
                            b
                            <input id="matrix-b" name="matrix-b" type="number" step="any">
                        </label>
                    </div>
                    <div class="matrix-row">
                        <label class="matrix-cell" for="matrix-c">
                            c
                            <input id="matrix-c" name="matrix-c" type="number" step="any">
                        </label>
                        <label class="matrix-cell" for="matrix-d">
                            d
                            <input id="matrix-d" name="matrix-d" type="number" step="any">
                        </label>
                    </div>
                </form>
            </section>
            <section class="canvas-panel">
                <canvas id="triangle-canvas" width="720" height="480"></canvas>
            </section>
        </div>
    </main>
    <script type="module" src="/dist/dot-product/main.js"></script>
</body>
</html>
