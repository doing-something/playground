<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 행렬 살펴보기</title>
    <link rel="stylesheet" href="../shared/demo.css">
    <style>
        main {
            width: min(1120px, calc(100% - 32px));
        }

        .step-list {
            display: grid;
            gap: 10px;
        }

        .step-card {
            padding: 12px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            background: #fff;
            display: grid;
            gap: 8px;
        }

        .step-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .step-head strong {
            font-size: 0.9rem;
            color: var(--text);
        }

        .step-remove {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            color: var(--muted);
        }

        .step-remove:hover {
            border-color: rgba(220, 38, 38, 0.5);
            color: #b91c1c;
        }

        .step-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .step-input {
            display: grid;
            gap: 4px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .step-input input {
            width: 64px;
            padding: 6px 8px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font: inherit;
        }

        .step-input input:focus {
            outline: 2px solid rgba(37, 99, 235, 0.22);
            border-color: rgba(37, 99, 235, 0.5);
        }

        .step-add-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .explanation-panel,
        .analysis-card {
            min-width: 0;
        }

        .analysis-card pre {
            margin: 6px 0 0;
            padding: 8px 10px;
            background: rgba(15, 23, 42, 0.04);
            border-radius: 8px;
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre;
            overflow-x: auto;
            max-width: 100%;
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 220px minmax(0, 1fr) 320px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="../dist/canvas-matrix/main.js"></script>
</body>
</html>
