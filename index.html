<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground Demos</title>
  <meta http-equiv="refresh" content="0; url=./matrix-transform/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36%),
        linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    a {
      color: #1d4ed8;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Playground Demos</h1>
    <p><a href="./matrix-transform/">matrix-transform 데모로 이동</a></p>
  </main>
</body>
</html>
