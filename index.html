<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground Demos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {},
      },
    };
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 36%),
        linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
    }

    main {
      width: min(640px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    li a {
      display: grid;
      gap: 4px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }

    li a:hover {
      border-color: rgba(37, 99, 235, 0.45);
      background: rgba(239, 246, 255, 0.7);
    }

    .demo-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1d4ed8;
    }

    .demo-description {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="react-root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="./home.jsx"></script>
</body>
</html>
