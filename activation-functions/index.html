<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Functions 데모</title>
    <link rel="stylesheet" href="../shared/demo.css">
    <style>
        main {
            width: min(1120px, calc(100% - 32px));
        }

        .layout {
            grid-template-columns: 1fr;
        }

        .tab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tab-button {
            padding: 8px 12px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 999px;
            background: #fff;
            color: var(--text);
            font: inherit;
            cursor: pointer;
        }

        .tab-button:hover {
            border-color: rgba(37, 99, 235, 0.45);
            background: rgba(239, 246, 255, 0.8);
        }

        .tab-button-active {
            border-color: rgba(37, 99, 235, 0.5);
            background: rgba(219, 234, 254, 0.95);
            color: #1d4ed8;
            font-weight: 600;
        }

        .activation-controls {
            display: grid;
            gap: 18px;
        }

        .activation-panel {
            display: grid;
            gap: 14px;
        }

        .activation-panel[hidden] {
            display: none !important;
        }

        .input-grid {
            display: grid;
            gap: 12px;
        }

        .range-control {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .range-control input {
            width: 100%;
        }

        .range-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--text);
            font-weight: 600;
        }

        .activation-analysis {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 280px minmax(0, 1fr) 280px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="../dist/activation-functions/main.js"></script>
</body>
</html>
