<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Functions 데모</title>
    <link rel="stylesheet" href="../shared/demo.css">
    <style>
        main {
            width: min(1120px, calc(100% - 32px));
        }

        .layout {
            grid-template-columns: 1fr;
        }

        .tab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.28);
        }

        .tab-button {
            margin-bottom: -1px;
            padding: 14px 20px;
            border: 0;
            border-bottom: 2px solid transparent;
            background: transparent;
            color: #334155;
            font: inherit;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .tab-button:hover {
            background: rgba(248, 250, 252, 0.92);
        }

        .tab-button-active {
            border-bottom-color: #2563eb;
            color: #1d4ed8;
            font-weight: 600;
        }

        .activation-tabs {
            grid-column: 1 / -1;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.72);
        }

        .activation-controls {
            display: grid;
            gap: 18px;
        }

        .activation-panel {
            display: grid;
            gap: 14px;
        }

        .activation-panel[hidden] {
            display: none !important;
        }

        .input-grid {
            display: grid;
            gap: 12px;
        }

        .range-control {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .range-control input {
            width: 100%;
        }

        .range-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--text);
            font-weight: 600;
        }

        .activation-analysis {
            grid-template-columns: 1fr;
        }

        .math-display {
            display: grid;
            gap: 8px;
            color: var(--text);
        }

        .math-line {
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(148, 163, 184, 0.16);
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 0.92rem;
            line-height: 1.6;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .math-line strong {
            color: #1d4ed8;
        }

        .math-note {
            margin: 0;
            font-size: 0.92rem;
            line-height: 1.55;
            color: var(--muted);
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 280px minmax(0, 1fr);
            }

            .activation-analysis {
                grid-column: 1 / -1;
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (min-width: 1180px) {
            .layout {
                grid-template-columns: 280px minmax(0, 1fr) 360px;
            }

            .activation-analysis {
                grid-column: auto;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="../dist/activation-functions/main.js"></script>
</body>
</html>
